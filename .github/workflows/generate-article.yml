name: Generate Article (Incremental)

on:
  schedule:
    # Run every 3 hours (8 times per day)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Article category (optional)'
        required: false
        type: choice
        options:
          - auto
          - World
          - Business
          - Technology
          - Politics
          - Science
          - Culture

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate single article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          CATEGORY="${{ github.event.inputs.category || 'auto' }}"
          if [ "$CATEGORY" = "auto" ]; then
            echo "Generating article with auto-selected category"
            node scripts/generate-single-article.js
          else
            echo "Generating $CATEGORY article"
            node scripts/generate-single-article.js --category "$CATEGORY"
          fi

      - name: Commit and push changes
        run: |
          git config user.name "Intelligence Bot"
          git config user.email "bot@intelligence.news"

          # Add generated files
          git add public/data/articles/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Get headline for commit message
          HEADLINE=$(node -e "
            const fs = require('fs');
            const pool = JSON.parse(fs.readFileSync('public/data/articles/pool.json', 'utf-8'));
            const latest = pool.articles[pool.articles.length - 1];
            console.log(latest?.headline?.substring(0, 50) || 'New article');
          ")

          git commit -m "Add article: $HEADLINE"
          git push
