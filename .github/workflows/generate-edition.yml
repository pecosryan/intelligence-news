name: Generate Daily Edition

on:
  schedule:
    # Run 3 times per day (6 AM, 2 PM, 10 PM UTC)
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      perspective:
        description: 'Editorial perspective'
        required: false
        default: 'center'
        type: choice
        options:
          - center
          - centerLeft
          - centerRight
          - left
          - right
          - libertarian

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate edition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PERSPECTIVE="${{ github.event.inputs.perspective || 'center' }}"
          echo "Generating edition with perspective: $PERSPECTIVE"
          node scripts/generate-edition.js --perspective "$PERSPECTIVE"

      - name: Commit and push changes
        run: |
          git config user.name "Intelligence Bot"
          git config user.email "bot@intelligence.news"

          # Add generated files
          git add public/data/articles/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Get headline for commit message
          HEADLINE=$(node -e "
            const fs = require('fs');
            const edition = JSON.parse(fs.readFileSync('public/data/articles/current-edition.json', 'utf-8'));
            console.log(edition.hero?.headline?.substring(0, 60) || 'New edition');
          ")

          git commit -m "Add edition: $HEADLINE"
          git push
